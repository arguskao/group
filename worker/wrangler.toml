name = "survey-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "survey-db"
database_id = "5029b843-01cc-424e-b57b-94028a0d9c1e"

# Environment variables
[vars]
ALLOWED_ORIGINS = "https://ff1015ad.survey-form-7u2.pages.dev,https://6b9016ef.survey-form-7u2.pages.dev"

# Development configuration
[env.development]
[[env.development.d1_databases]]
binding = "DB"
database_name = "survey-db-dev"
database_id = "placeholder-dev-id"

# Production configuration
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "survey-db-prod"
database_id = "placeholder-prod-id"

[env.production.vars]
ALLOWED_ORIGINS = "https://ff1015ad.survey-form-7u2.pages.dev,https://6b9016ef.survey-form-7u2.pages.dev"
